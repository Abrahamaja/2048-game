name: Build and Deploy

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: "${{ secrets.abrahamaja }}/2048-abrahamklosesawedu"

jobs:
  build:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t $IMAGE_NAME .
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.abrahamaja }}
          password: ${{ secrets.SabelCantik123;? }}
      - run: docker push $IMAGE_NAME

  deploy:
    needs: build
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - run: docker compose down --rmi all
      - run: docker compose up -d
